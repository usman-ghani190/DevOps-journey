name: Hello Python App to Docker
on:
  push:
  workflow_dispatch:
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: docker/app1-hello/python
        run: pip install -r requirements.txt

      - name: Run Smoke Tests
        working-directory: docker/app1-hello/python
        run: python -m py_compile main.py

  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: docker/app1-hello/python
          file: docker/app1-hello/python/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/hello-python:latest

  deploy-to-eks:
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --name hello-cluster --region ap-south-1

      - name: verify connetion to EKS
        run: kubectl get nodes

      - name: Deploy to AWS EKS
        run: kubectl apply -f docker/k8s/aws/app1-hello/app.yaml
