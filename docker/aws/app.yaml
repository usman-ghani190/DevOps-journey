apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-app
  template:
    metadata:
      labels:
        app: python-app
    spec:
      containers:
        - name: python-app
          image: embarkx/hello-python:latest
          env:
            - name: ENV_VALUE
              value: "Hello from aws deployment"
            - name: DB_PASSWORD
              value: "cGFzc3dvcmQ="
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: python-app
spec:
  type: LoadBalancer
  selector:
    app: python-app
  ports:
    - port: 8080
      targetPort: 3000
