apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1-hello

spec:
  replicas: 2
  selector:
    matchLabels:
      app: app1-hello

  template:
    metadata:
      labels:
        app: app1-hello

    spec:
      containers:
        - name: app1-hello
          image: ghani5511/hello-spring:latest
          env:
            - name: ENV_VALUE
              value: "Hello from aws deployment"

            - name: DB_PASSWORD
              value: "cGFzc3dvcmQ="

          ports:
            - containerPort: 8080

---
apiVersion: v1
kind: Service

metadata:
  name: app1-hello

spec:
  type: LoadBalancer

  selector:
    app: app1-hello

  ports:
    - port: 8080
      targetPort: 8080
