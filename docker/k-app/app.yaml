apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-app
  template:
    metadata:
      labels:
        app: python-app
    spec:
      containers:
        - name: python-app
          image: embarkx/hello-python:latest
          env:
            - name: ENV_VALUE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ENV_VALUE

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PASSWORD
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: python-app
spec:
  selector:
    app: python-app
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 32000
