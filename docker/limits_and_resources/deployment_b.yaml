apiVersion: apps/v1
kind: Deployment
metadata:
  name: depoyment-b
spec:
  selector:
    matchLabels:
      app: depoyment-b
  template:
    metadata:
      labels:
        app: depoyment-b
    spec:
      containers:
        - name: depoyment-b
          image: nginx
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
